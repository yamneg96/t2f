version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile-api
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGODB_URI=mongodb+srv://yamlaknegash96_db_user:[EMAIL_ADDRESS]/?appName=Cluster0
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - FIGMA_API_KEY=${FIGMA_API_KEY:-}
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
