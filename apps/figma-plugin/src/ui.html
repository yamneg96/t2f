<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tailwind2Figma</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #060e20;
      color: #dee5ff;
      padding: 20px;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }
    .header .badge {
      font-size: 9px;
      padding: 2px 6px;
      background: rgba(59, 191, 250, 0.1);
      border: 1px solid rgba(59, 191, 250, 0.3);
      border-radius: 4px;
      color: #3bbffa;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .section-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #6d758c;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      height: 220px;
      background: #0f1930;
      border: 1px solid rgba(64, 72, 93, 0.3);
      border-radius: 6px;
      color: #dee5ff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 12px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus {
      border-color: #3bbffa;
    }
    textarea::placeholder {
      color: #40485d;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #3bbffa, #22b1ec);
      color: #00374d;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #141f38;
      color: #a3aac4;
      border: 1px solid rgba(64, 72, 93, 0.3);
    }
    .btn-secondary:hover { background: #192540; }
    .status {
      margin-top: 16px;
      padding: 10px;
      border-radius: 4px;
      font-size: 11px;
      display: none;
    }
    .status.visible { display: block; }
    .status.success {
      background: rgba(105, 246, 184, 0.1);
      border: 1px solid rgba(105, 246, 184, 0.3);
      color: #69f6b8;
    }
    .status.error {
      background: rgba(255, 113, 108, 0.1);
      border: 1px solid rgba(255, 113, 108, 0.3);
      color: #ff716c;
    }
    .divider {
      height: 1px;
      background: rgba(64, 72, 93, 0.2);
      margin: 16px 0;
    }
    .info {
      font-size: 11px;
      color: #6d758c;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Tailwind2Figma</h1>
    <span class="badge">v2.4.0</span>
  </div>

  <div class="section-label">Paste IR JSON</div>
  <textarea id="ir-input" placeholder='{ "version": "1.0", "meta": {...}, "tokens": {...}, "nodes": [...] }'></textarea>

  <div class="actions">
    <button class="btn btn-primary" id="import-btn" onclick="handleImport()">
      Import to Canvas
    </button>
    <button class="btn btn-secondary" onclick="parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*')">
      Cancel
    </button>
  </div>

  <div id="status" class="status"></div>

  <div class="divider"></div>

  <div class="info">
    Paste the IR JSON output from the Tailwind2Figma web app. The plugin will
    create Auto Layout frames, text nodes, and design tokens directly on your
    current Figma page.
  </div>

  <script>
    function handleImport() {
      const textarea = document.getElementById('ir-input');
      const statusEl = document.getElementById('status');
      const btn = document.getElementById('import-btn');

      const raw = textarea.value.trim();
      if (!raw) {
        showStatus('Please paste IR JSON first.', 'error');
        return;
      }

      let ir;
      try {
        ir = JSON.parse(raw);
      } catch (e) {
        showStatus('Invalid JSON: ' + e.message, 'error');
        return;
      }

      if (!ir.version || !ir.nodes) {
        showStatus('Invalid IR schema: missing "version" or "nodes".', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Importing...';
      showStatus('Sending IR to Figma...', 'success');

      parent.postMessage({
        pluginMessage: { type: 'import-ir', ir: ir }
      }, '*');

      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = 'Import to Canvas';
      }, 3000);
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status visible ' + type;
    }
  </script>
</body>
</html>
